<style>
  .fl-filters {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    align-items: center;
  }
  .fl-filters select {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.4rem 0.75rem;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: var(--card-bg);
    color: var(--dark-text);
    cursor: pointer;
  }
  .fl-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--slate-blue);
    margin-bottom: 0.75rem;
  }
  .fl-table {
    background: var(--card-bg);
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .fl-row {
    display: grid;
    grid-template-columns: 90px 1fr auto;
    align-items: center;
    gap: 1rem;
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid #e8e4dc;
    cursor: pointer;
    transition: background-color 0.12s ease;
    position: relative;
  }
  .fl-row:last-child { border-bottom: none; }
  .fl-row:hover { background-color: rgba(74, 124, 89, 0.04); }
  .fl-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: transparent;
    transition: background-color 0.12s;
  }
  .fl-row:hover::before { background: var(--primary-green); }
  .fl-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--slate-blue);
    line-height: 1.4;
  }
  .fl-date span { display: block; font-size: 0.7rem; opacity: 0.65; }
  .fl-species { font-family: 'Roboto Condensed', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--dark-text); }
  .fl-meta { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--slate-blue); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .fl-health-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .fl-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .fl-empty {
    text-align: center;
    padding: 3rem;
    color: var(--slate-blue);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    opacity: 0.6;
  }
  .fl-pagination {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .fl-pagination button {
    padding: 0.35rem 0.9rem;
    border: 1px solid var(--primary-green);
    border-radius: 6px;
    background: transparent;
    color: var(--primary-green);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.12s;
  }
  .fl-pagination button.active, .fl-pagination button:hover { background: var(--primary-green); color: #fff; }
</style>

<div class="card" style="margin-bottom:1.5rem;">
  <h2>Field Log</h2>
  <p style="color:var(--slate-blue);font-size:0.9rem;">Complete observation history</p>
</div>

<div class="fl-filters">
  <select id="fl-species-filter"><option value="">All Species</option></select>
  <select id="fl-approach-filter">
    <option value="">All Approachability</option>
    <option value="Approach Safely">Approach Safely</option>
    <option value="Observe from Distance">Observe from Distance</option>
    <option value="Do Not Approach">Do Not Approach</option>
  </select>
  <select id="fl-date-filter">
    <option value="all">All Time</option>
    <option value="today">Today</option>
    <option value="week">This Week</option>
  </select>
  <select id="fl-habitat-filter">
    <option value="">All Habitat</option>
    <option value="in">In Range</option>
    <option value="out">Out of Range</option>
  </select>
</div>

<div class="fl-count" id="fl-count">Loading…</div>
<div class="fl-table" id="fl-table"></div>
<div class="fl-pagination" id="fl-pagination"></div>

<script type="module">
  import { mockObservations } from './app.js';
  import { supabase } from './supabase.js';

  const PAGE_SIZE = 20;
  let allObs = [];
  let currentPage = 1;

  const isGuest = new URLSearchParams(window.location.search).get('guest') === 'true';

  function normalizeObs(o) {
    return {
      id: o.id,
      species: o.species_name ?? o.species,
      timestamp: o.timestamp,
      confidence: o.confidence,
      status: o.conservation_status ?? o.status,
      venomous: o.is_venomous ?? o.venomous,
      approachability: o.approachability,
      habitat: o.habitat ?? (o.habitat_match === true ? 'in' : o.habitat_match === false ? 'out' : 'in'),
      lat: o.latitude ?? o.lat,
      lon: o.longitude ?? o.lon,
      health_status: o.health_status,
    };
  }

  function healthColor(s) {
    if (s === 'RED') return '#C0392B';
    if (s === 'ORANGE') return '#E8923A';
    return '#4A7C59';
  }

  function approachColor(t) {
    if (!t) return '#888';
    if (t.includes('Do Not')) return '#C0392B';
    if (t.includes('Observe')) return '#E8923A';
    return '#4A7C59';
  }

  function badgeClass(t) {
    if (t === 'Approach Safely') return 'approach-safe';
    if (t === 'Observe from Distance') return 'observe-distance';
    return 'do-not-approach';
  }

  function isToday(ts) {
    const d = new Date(ts); const n = new Date();
    return d.toDateString() === n.toDateString();
  }
  function isThisWeek(ts) {
    const d = new Date(ts); const n = new Date();
    const weekAgo = new Date(n - 7 * 86400000);
    return d >= weekAgo;
  }

  function applyFilters() {
    const species = document.getElementById('fl-species-filter').value;
    const approach = document.getElementById('fl-approach-filter').value;
    const date = document.getElementById('fl-date-filter').value;
    const habitat = document.getElementById('fl-habitat-filter').value;

    return allObs.filter(o => {
      if (species && o.species !== species) return false;
      if (approach && o.approachability !== approach) return false;
      if (date === 'today' && !isToday(o.timestamp)) return false;
      if (date === 'week' && !isThisWeek(o.timestamp)) return false;
      if (habitat === 'in' && o.habitat !== 'in') return false;
      if (habitat === 'out' && o.habitat !== 'out') return false;
      return true;
    });
  }

  function renderPage(filtered) {
    const total = filtered.length;
    document.getElementById('fl-count').textContent = `${total} observation${total !== 1 ? 's' : ''}`;

    const table = document.getElementById('fl-table');
    const start = (currentPage - 1) * PAGE_SIZE;
    const page = filtered.slice(start, start + PAGE_SIZE);

    if (!page.length) {
      table.innerHTML = '<div class="fl-empty">No observations match these filters.</div>';
      document.getElementById('fl-pagination').innerHTML = '';
      return;
    }

    table.innerHTML = page.map(o => {
      const d = new Date(o.timestamp);
      const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      const habitatIcon = o.habitat === 'in' ? '✓' : '⚠';
      const habitatColor = o.habitat === 'in' ? 'var(--primary-green)' : 'var(--accent-orange)';
      const dotColor = healthColor(o.health_status);
      const venomousPill = o.venomous ? `<span class="badge venomous" style="font-size:0.7rem;">⚠ Venomous</span>` : '';
      return `
        <div class="fl-row" data-id="${o.id}" onclick="window.location.href='journal.html?id=${o.id}'">
          <div class="fl-date">${dateStr}<span>${timeStr}</span></div>
          <div>
            <div class="fl-species">${o.species}</div>
            <div class="fl-meta">
              <span class="fl-health-dot" style="background:${dotColor}" title="Health: ${o.health_status || 'GREEN'}"></span>
              <span style="color:${habitatColor}">${habitatIcon}</span>
              ${o.habitat === 'in' ? 'In Range' : 'Out of Range'} &nbsp;·&nbsp;
              ${o.confidence || '—'}% conf
            </div>
          </div>
          <div class="fl-right">
            <span class="badge ${badgeClass(o.approachability)}">${o.approachability}</span>
            ${venomousPill}
          </div>
        </div>`;
    }).join('');

    // Pagination
    const totalPages = Math.ceil(total / PAGE_SIZE);
    const pag = document.getElementById('fl-pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    pag.innerHTML = Array.from({ length: totalPages }, (_, i) =>
      `<button class="${i + 1 === currentPage ? 'active' : ''}" data-page="${i + 1}">${i + 1}</button>`
    ).join('');
    pag.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        currentPage = parseInt(btn.dataset.page);
        renderPage(applyFilters());
      });
    });
  }

  function onFilterChange() {
    currentPage = 1;
    renderPage(applyFilters());
  }

  ['fl-species-filter','fl-approach-filter','fl-date-filter','fl-habitat-filter']
    .forEach(id => document.getElementById(id).addEventListener('change', onFilterChange));

  async function load() {
    if (isGuest) {
      allObs = mockObservations.map(normalizeObs);
    } else {
      try {
        const res = await supabase.from('observations').select('*').order('timestamp', { ascending: false });
        allObs = (res.data && res.data.length > 0) ? res.data.map(normalizeObs) : mockObservations.map(normalizeObs);
      } catch (e) {
        allObs = mockObservations.map(normalizeObs);
      }
    }

    // Populate species dropdown
    const speciesSet = [...new Set(allObs.map(o => o.species).filter(Boolean))].sort();
    const sel = document.getElementById('fl-species-filter');
    speciesSet.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });

    renderPage(applyFilters());
  }

  load();
</script>
