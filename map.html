<style>
  #map {
    height: 600px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .map-legend {
    background-color: white;
    padding: 1rem;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    margin-top: 1.5rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .legend-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid white;
  }

  .legend-label {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 0.95rem;
  }
</style>

<div id="map"></div>

<div class="map-legend">
  <h3 style="margin-bottom: 1rem; font-family: 'Roboto Condensed', sans-serif;">Legend</h3>
  <div class="legend-item">
    <div class="legend-dot" style="background-color: #4A7C59;"></div>
    <span class="legend-label">Approach Safely</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background-color: #E8923A;"></div>
    <span class="legend-label">Observe from Distance</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background-color: #C0392B;"></div>
    <span class="legend-label">Do Not Approach</span>
  </div>
</div>

<script type="module">
  import { mockObservations, getApproachabilityColor } from './app.js';
  import { supabase } from './supabase.js';

  const isGuest = new URLSearchParams(window.location.search).get('guest') === 'true';
  const currentUser = localStorage.getItem('tm_user') || '';

  const map = L.map('map').setView([32.88, -117.23], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  const markerIds = new Set();

  function addMarker(obs) {
    const lat = obs.lat ?? obs.latitude;
    const lon = obs.lon ?? obs.longitude;
    if (!lat || !lon) return;
    if (obs.id && markerIds.has(obs.id)) return;
    if (obs.id) markerIds.add(obs.id);
    const color = getApproachabilityColor(obs.approachability);
    const marker = L.circleMarker([lat, lon], {
      radius: 8,
      fillColor: color,
      color: color,
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map);

    const species = obs.species ?? obs.species_name;
    const popupContent = `
      <div style="font-family: 'Roboto Condensed', sans-serif;">
        <strong>${species}</strong><br>
        <span style="display: inline-block; background-color: ${color}; color: white; padding: 0.25rem 0.5rem; border-radius: 3px; font-size: 0.85rem; margin-top: 0.5rem;">
          ${obs.approachability}
        </span><br>
        <span style="font-family: 'DM Mono', monospace; font-size: 0.9rem; margin-top: 0.5rem; display: block;">
          ${lat.toFixed(3)}, ${lon.toFixed(3)}
        </span>
        <small style="color: #666; display: block; margin-top: 0.5rem;">
          ${new Date(obs.timestamp).toLocaleString()}
        </small>
      </div>
    `;

    marker.bindPopup(popupContent);
  }

  async function loadMarkers() {
    if (isGuest) {
      mockObservations.forEach(addMarker);
    } else {
      try {
        let query = supabase.from('observations').select('*');
        const response = await query;

        if (response.error) {
          mockObservations.forEach(addMarker);
        } else {
          const observations = response.data && response.data.length > 0 ? response.data : mockObservations;
          observations.forEach(addMarker);
        }
      } catch (error) {
        mockObservations.forEach(addMarker);
      }
    }
  }

  loadMarkers();

  // Subscribe to real-time updates if logged in
  if (!isGuest) {
    supabase
      .channel('map-observations')
      .on(
        'postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'observations' },
        (payload) => {
          const row = payload.new;
          if (currentUser && row.researcher_name && row.researcher_name !== currentUser) return;
          addMarker(row);
        }
      )
      .subscribe();

    // /events fallback polling every 5 seconds
    setInterval(async () => {
      try {
        const res = await fetch('http://localhost:8000/events');
        if (!res.ok) return;
        const events = await res.json();
        events.forEach(ev => addMarker({ ...ev, lat: ev.lat, lon: ev.lon, species: ev.species }));
      } catch (e) {}
    }, 5000);
  }
</script>
