<style>
  .log-header {
    margin-bottom: 0;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--dark-text);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .log-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.75rem;
    color: var(--dark-text);
  }

  .log-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--slate-blue);
  }

  .journal-index {
    background-color: var(--card-bg);
    border-radius: 0 0 8px 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  .journal-row {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    align-items: center;
    gap: 1.5rem;
    padding: 1rem 1.5rem;
    cursor: pointer;
    border-bottom: 1px solid #e8e4dc;
    background-image: repeating-linear-gradient(
      transparent,
      transparent 31px,
      #ddd6c8 31px,
      #ddd6c8 32px
    );
    background-position: 0 8px;
    transition: background-color 0.15s ease;
    position: relative;
  }

  .journal-row:last-child { border-bottom: none; }

  .journal-row:hover {
    background-color: rgba(74, 124, 89, 0.04);
  }

  .journal-row::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background-color: transparent;
    transition: background-color 0.15s ease;
  }

  .journal-row:hover::before {
    background-color: var(--primary-green);
  }

  .entry-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--slate-blue);
    line-height: 1.4;
    white-space: nowrap;
  }

  .entry-date .entry-time {
    display: block;
    font-size: 0.75rem;
    opacity: 0.7;
  }

  .entry-species {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--dark-text);
    line-height: 1.3;
    word-break: break-word;
    overflow-wrap: break-word;
  }

  .entry-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--slate-blue);
    margin-top: 0.2rem;
    word-break: break-word;
    overflow-wrap: break-word;
  }

  .entry-badge-col {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.4rem;
  }

  .awaiting-pulse {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--slate-blue);
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @keyframes newRowFlash {
    0%   { background-color: rgba(74, 124, 89, 0.18); }
    100% { background-color: transparent; }
  }
  .journal-row.new-arrival::before {
    background-color: var(--primary-green) !important;
    transition: background-color 2s ease;
  }
  .journal-row.new-arrival {
    animation: newRowFlash 2s ease-out;
  }
</style>

<div class="log-header">
  <span class="log-title">Field Log</span>
  <span class="log-subtitle" id="entry-count">Loading…</span>
</div>

<div class="journal-index" id="journal-index"></div>

<script type="module">
  import { mockObservations, formatDate, formatTimestamp } from './app.js';
  import { supabase } from './supabase.js';

  const index = document.getElementById('journal-index');
  const isGuest = new URLSearchParams(window.location.search).get('guest') === 'true';
  const knownIds = new Set();
  let firstLoad = true;

  function getBadgeClass(approachability) {
    if (approachability === 'Approach Safely') return 'approach-safe';
    if (approachability === 'Observe from Distance') return 'observe-distance';
    return 'do-not-approach';
  }

  function openEntry(id) {
    const base = window.location.href.includes('?') ? window.location.origin + '/journal.html' : 'journal.html';
    const guestParam = isGuest ? '&guest=true' : '';
    window.location.href = `journal.html?id=${id}${guestParam}`;
  }

  function renderRow(obs) {
    const date = new Date(obs.timestamp);
    const badgeClass = getBadgeClass(obs.approachability);
    const habitatIcon = obs.habitat === 'in' ? '✓' : '⚠';
    const habitatColor = obs.habitat === 'in' ? 'var(--primary-green)' : 'var(--accent-orange)';

    return `
      <div class="journal-row" data-id="${obs.id}">
        <div class="entry-date">
          ${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
          <span class="entry-time">${date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</span>
        </div>
        <div>
          <div class="entry-species">${obs.species}</div>
          <div class="entry-meta">
            <span style="color:${habitatColor}">${habitatIcon}</span>
            ${obs.habitat === 'in' ? 'In Range' : 'Out of Range'} &nbsp;·&nbsp;
            ${obs.confidence || '—'}% confidence &nbsp;·&nbsp;
            ${obs.lat ? obs.lat.toFixed(3) : '—'}, ${obs.lon ? obs.lon.toFixed(3) : '—'}
          </div>
        </div>
        <div class="entry-badge-col">
          <span class="badge ${badgeClass}">${obs.approachability}</span>
          ${obs.venomous ? '<span class="badge venomous" style="font-size:0.75rem;">⚠ Venomous</span>' : ''}
        </div>
      </div>
    `;
  }

  function renderEmpty() {
    return `<div class="awaiting-pulse">Awaiting field observations…</div>`;
  }

  // Normalize Supabase row shape to the renderer's expected fields
  function normalizeObs(o) {
    return {
      id: o.id,
      species: o.species_name ?? o.species,
      timestamp: o.timestamp,
      confidence: o.confidence,
      status: o.conservation_status ?? o.status,
      venomous: o.is_venomous ?? o.venomous,
      approachability: o.approachability,
      habitat: o.habitat ?? (o.habitat_match ? 'in' : 'out'),
      lat: o.latitude ?? o.lat,
      lon: o.longitude ?? o.lon,
      temp: o.temperature ?? o.temp,
      humidity: o.humidity,
      distance: o.distance_cm ?? o.distance,
      image_url: o.image_url,
      notes: o.notes,
    };
  }

  async function loadLog() {
    let observations = [];

    if (isGuest) {
      observations = mockObservations;
    } else {
      const response = await supabase
        .from('observations')
        .select('*')
        .order('timestamp', { ascending: false });
      observations = (response.data && response.data.length > 0)
        ? response.data.map(normalizeObs)
        : mockObservations;
    }

    document.getElementById('entry-count').textContent =
      `${observations.length} entr${observations.length === 1 ? 'y' : 'ies'}`;

    // Identify newly arrived IDs (skip flash on the very first render)
    const newIds = new Set();
    if (!firstLoad) {
      observations.forEach(obs => {
        if (!knownIds.has(obs.id)) newIds.add(obs.id);
      });
    }
    observations.forEach(obs => knownIds.add(obs.id));
    firstLoad = false;

    index.innerHTML = observations.length > 0
      ? observations.map(renderRow).join('')
      : renderEmpty();

    index.querySelectorAll('.journal-row').forEach(row => {
      row.addEventListener('click', () => openEntry(row.dataset.id));
      if (newIds.has(row.dataset.id)) {
        row.classList.add('new-arrival');
        setTimeout(() => row.classList.remove('new-arrival'), 2000);
      }
    });
  }

  loadLog();
  setInterval(loadLog, 5000);

  if (!isGuest) {
    supabase.channel('observations')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'observations' }, loadLog)
      .subscribe();
  }
</script>
