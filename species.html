<style>
  .species-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .species-card {
    background-color: var(--card-bg);
    border-radius: 8px;
    padding: 1.5rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    transition: transform 0.2s, box-shadow 0.2s;
    border-top: 4px solid var(--primary-green);
  }

  .species-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
  }

  .species-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    text-align: center;
  }

  .species-name {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--dark-text);
    margin-bottom: 1rem;
    line-height: 1.3;
  }

  .species-info {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--light-gray);
  }

  .info-label {
    color: var(--slate-blue);
    font-weight: 500;
  }

  .info-value {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 500;
  }

  .habitat {
    background-color: #F9F7F3;
    padding: 0.75rem;
    border-radius: 4px;
    font-size: 0.85rem;
    color: var(--dark-text);
    line-height: 1.5;
  }

  .habitat-label {
    display: block;
    color: var(--slate-blue);
    font-weight: 500;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
  }
</style>

<div class="card" style="margin-bottom: 2rem;">
  <h2>San Diego Species Guide</h2>
  <p style="color: var(--slate-blue); font-size: 0.95rem;">Reference information for common San Diego reptiles</p>
</div>

<div class="species-grid" id="species-container"></div>

<script type="module">
  import { speciesData } from './app.js';

  const container = document.getElementById('species-container');

  const speciesList = [
    'Western Fence Lizard',
    'Southern Pacific Rattlesnake',
    'Southern Alligator Lizard',
    'Western Skink',
    'California King Snake',
    'Orange-throated Whiptail',
    'Western Side-blotched Lizard',
    'San Diegan Legless Lizard'
  ];

  const icons = {
    'Western Fence Lizard': '🦎',
    'Southern Pacific Rattlesnake': '🐍',
    'Southern Alligator Lizard': '🦎',
    'Western Skink': '🦎',
    'California King Snake': '🐍',
    'Orange-throated Whiptail': '🦎',
    'Western Side-blotched Lizard': '🦎',
    'San Diegan Legless Lizard': '🐍'
  };

  function getApproachabilityBadgeClass(approachability) {
    if (approachability === 'Approach Safely') return 'approach-safe';
    if (approachability === 'Observe from Distance') return 'observe-distance';
    if (approachability === 'Do Not Approach') return 'do-not-approach';
    return '';
  }

  speciesList.forEach(species => {
    const data = speciesData[species];
    const html = `
      <div class="species-card">
        <div class="species-icon">${icons[species] || '🐍'}</div>
        <div class="species-name">${species}</div>
        <div class="species-info">
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-value">${data.status}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Venomous</span>
            <span class="info-value">${data.venomous ? '⚠ Yes' : 'No'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Approach</span>
            <span class="badge ${getApproachabilityBadgeClass(data.approachability)}" style="margin: 0;">
              ${data.approachability}
            </span>
          </div>
        </div>
        <div class="habitat">
          <span class="habitat-label">Typical San Diego Habitat</span>
          ${data.habitat}
        </div>
      </div>
    `;
    container.innerHTML += html;
  });
</script>
