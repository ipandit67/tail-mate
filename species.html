<style>
  .discoveries-header {
    margin-bottom: 1.5rem;
  }
  .discovery-counter {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--primary-green);
    margin-top: 0.4rem;
  }
  .species-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }
  .species-card {
    background-color: var(--card-bg);
    border-radius: 8px;
    padding: 1.5rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    border-top: 4px solid var(--primary-green);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .species-card.locked {
    background-color: #2c2c2c;
    border-top-color: #444;
    filter: none;
  }
  .species-card.locked:hover {
    transform: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .species-card.unlocked {
    animation: unlockReveal 400ms ease-out;
  }
  @keyframes unlockReveal {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }
  .species-card.unlocked:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
  }
  .locked-silhouette {
    text-align: center;
    padding: 1rem 0;
  }
  .locked-icon {
    width: 56px;
    height: 56px;
    background: #444;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 0.75rem;
    font-size: 1.5rem;
    color: #888;
    font-weight: 700;
  }
  .locked-label {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #666;
    margin-bottom: 0.25rem;
  }
  .locked-sublabel {
    font-size: 0.8rem;
    color: #555;
    font-family: 'DM Mono', monospace;
  }
  .species-name {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--dark-text);
    margin-bottom: 1rem;
    line-height: 1.3;
  }
  .species-info {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--light-gray);
  }
  .info-label {
    color: var(--slate-blue);
    font-weight: 500;
  }
  .info-value {
    font-family: 'Roboto Condensed', sans-serif;
    font-weight: 500;
  }
  .habitat {
    background-color: #F9F7F3;
    padding: 0.75rem;
    border-radius: 4px;
    font-size: 0.85rem;
    color: var(--dark-text);
    line-height: 1.5;
  }
  .habitat-label {
    display: block;
    color: var(--slate-blue);
    font-weight: 500;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
  }
</style>

<div class="card discoveries-header" style="margin-bottom: 1.5rem;">
  <h2>Field Discoveries</h2>
  <p style="color: var(--slate-blue); font-size: 0.95rem;">Species unlock when you observe them in the field</p>
  <div class="discovery-counter" id="discovery-counter">Loading…</div>
</div>

<div class="species-grid" id="species-container"></div>

<script type="module">
  import { speciesData } from './app.js';
  import { supabase } from './supabase.js';

  const isGuest = new URLSearchParams(window.location.search).get('guest') === 'true';
  const currentUser = localStorage.getItem('tm_user') || '';

  const container = document.getElementById('species-container');

  const speciesList = [
    'Western Fence Lizard',
    'Southern Pacific Rattlesnake',
    'Southern Alligator Lizard',
    'Western Skink',
    'California King Snake',
    'Orange-throated Whiptail',
    'Western Side-blotched Lizard',
    'San Diegan Legless Lizard'
  ];

  function getApproachabilityBadgeClass(approachability) {
    if (approachability === 'Approach Safely') return 'approach-safe';
    if (approachability === 'Observe from Distance') return 'observe-distance';
    if (approachability === 'Do Not Approach') return 'do-not-approach';
    return '';
  }

  function renderLockedCard(species) {
    return `
      <div class="species-card locked" id="card-${species.replace(/\s+/g,'_')}">
        <div class="locked-silhouette">
          <div class="locked-icon">?</div>
          <div class="locked-label">${species}</div>
          <div class="locked-sublabel">Not yet discovered</div>
        </div>
      </div>`;
  }

  function renderUnlockedCard(species, animate) {
    const data = speciesData[species];
    if (!data) return '';
    return `
      <div class="species-card ${animate ? 'unlocked' : ''}" id="card-${species.replace(/\s+/g,'_')}">
        <div class="species-name">${species}</div>
        <div class="species-info">
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="info-value">${data.status}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Venomous</span>
            <span class="info-value">${data.venomous ? 'Yes' : 'No'}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Approach</span>
            <span class="badge ${getApproachabilityBadgeClass(data.approachability)}" style="margin: 0;">
              ${data.approachability}
            </span>
          </div>
        </div>
        <div class="habitat">
          <span class="habitat-label">Typical San Diego Habitat</span>
          ${data.habitat}
        </div>
      </div>`;
  }

  async function load() {
    let discoveredSet = new Set();

    if (isGuest) {
      // Show all as unlocked in guest mode
      speciesList.forEach(s => discoveredSet.add(s));
    } else {
      try {
        let query = supabase.from('observations').select('species_name');
        if (currentUser) query = query.eq('researcher_name', currentUser);
        const res = await query;
        if (res.data) {
          res.data.forEach(row => {
            if (row.species_name) discoveredSet.add(row.species_name);
          });
        }
      } catch (e) {}
    }

    const total = speciesList.length;
    const found = speciesList.filter(s => discoveredSet.has(s)).length;
    document.getElementById('discovery-counter').textContent = `${found} / ${total} species discovered`;

    container.innerHTML = speciesList.map(species =>
      discoveredSet.has(species) ? renderUnlockedCard(species, false) : renderLockedCard(species)
    ).join('');
  }

  load();

  // Real-time unlock: listen for new observations
  if (!isGuest) {
    supabase.channel('species-discoveries')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'observations' }, (payload) => {
        const row = payload.new;
        if (currentUser && row.researcher_name && row.researcher_name !== currentUser) return;
        const species = row.species_name;
        if (!species || !speciesList.includes(species)) return;
        const cardId = 'card-' + species.replace(/\s+/g, '_');
        const existing = document.getElementById(cardId);
        if (existing && existing.classList.contains('locked')) {
          existing.outerHTML = renderUnlockedCard(species, true);
          // Update counter
          const counter = document.getElementById('discovery-counter');
          const match = counter.textContent.match(/(\d+) \/ (\d+)/);
          if (match) counter.textContent = `${parseInt(match[1]) + 1} / ${match[2]} species discovered`;
        }
      })
      .subscribe();
  }
</script>
